<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=3">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <div class="glass-panel" style="max-width: 400px; margin: 0 auto;">
            <div class="header">
                <h1>Admin Login</h1>
                <p>Secure Portal Access</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                <div class="flash-messages">
                {% for category, message in messages %}
                  <div class="flash-alert flash-{{ category }}">{{ message }}</div>
                {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <div class="input-group">
                    <input type="text" id="username" name="username" required placeholder=" ">
                    <label for="username">Username</label>
                    <div class="border-highlight"></div>
                </div>

                <div class="input-group">
                    <input type="password" id="password" name="password" required placeholder=" ">
                    <label for="password">Password</label>
                    <div class="border-highlight"></div>
                </div>

                <button type="submit" class="glow-btn">
                    <span>Login</span>
                    <div class="btn-glow"></div>
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="/" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">Back to Registration</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
        VanillaTilt.init(document.querySelector(".glass-panel"), {
            max: 5,
            speed: 400,
            glare: true,
            "max-glare": 0.2,
        });
    </script>
</body>
</html>
